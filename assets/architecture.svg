<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb"/>
      <stop offset="100%" style="stop-color:#0d419d"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#5c2ec4"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#218636"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" fill="#f0f6fc" font-family="system-ui, sans-serif" font-size="22" font-weight="600">
    Platform Architecture
  </text>

  <!-- Layer Labels -->
  <text x="30" y="125" fill="#8b949e" font-family="monospace" font-size="12">PRESENTATION</text>
  <text x="30" y="235" fill="#8b949e" font-family="monospace" font-size="12">APPLICATION</text>
  <text x="30" y="365" fill="#8b949e" font-family="monospace" font-size="12">INFRASTRUCTURE</text>
  <text x="30" y="520" fill="#8b949e" font-family="monospace" font-size="12">DATA</text>

  <!-- Layer dividers -->
  <g stroke="#21262d" stroke-width="1" opacity="0.6">
    <line x1="120" y1="150" x2="980" y2="150"/>
    <line x1="120" y1="270" x2="980" y2="270"/>
    <line x1="120" y1="410" x2="980" y2="410"/>
  </g>

  <!-- Presentation Layer -->
  <!-- API Gateway -->
  <rect x="400" y="85" width="180" height="52" rx="8" fill="url(#blueGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="490" y="116" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="600">API Gateway</text>

  <!-- Load Balancer -->
  <rect x="160" y="85" width="180" height="52" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5" opacity="0.9"/>
  <text x="250" y="116" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="14">Load Balancer</text>

  <!-- CDN -->
  <rect x="660" y="85" width="180" height="52" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5" opacity="0.9"/>
  <text x="750" y="116" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="14">CDN / Edge</text>

  <!-- Application Layer -->
  <!-- Orchestrator -->
  <rect x="410" y="180" width="200" height="70" rx="8" fill="url(#purpleGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="510" y="208" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Workflow Orchestrator</text>
  <text x="510" y="230" text-anchor="middle" fill="#d2daf4" font-family="monospace" font-size="11">Prefect · Task Scheduler · DAG Engine</text>

  <!-- Workers -->
  <rect x="160" y="180" width="180" height="70" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5" opacity="0.9"/>
  <text x="250" y="208" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="14">Worker Pool</text>
  <text x="250" y="230" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11">Celery · Distributed Tasks</text>

  <!-- Event Bus -->
  <rect x="660" y="180" width="180" height="70" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5" opacity="0.9"/>
  <text x="750" y="208" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="14">Event Bus</text>
  <text x="750" y="230" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11">Kafka · Event Streaming</text>

  <!-- Infrastructure Layer -->
  <!-- Compute -->
  <rect x="55" y="310" width="160" height="80" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5" opacity="0.9"/>
  <text x="135" y="342" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Compute</text>
  <text x="135" y="364" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11">AWS ECS / EC2</text>
  <text x="135" y="380" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11">Kubernetes (EKS)</text>

  <!-- Containers -->
  <rect x="240" y="310" width="160" height="80" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5" opacity="0.9"/>
  <text x="320" y="342" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Containers</text>
  <text x="320" y="364" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11">Docker · ECR</text>
  <text x="320" y="380" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11">Container Registry</text>

  <!-- IaC -->
  <rect x="420" y="310" width="160" height="80" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5" opacity="0.9"/>
  <text x="500" y="342" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="13" font-weight="600">IaC &amp; CI/CD</text>
  <text x="500" y="364" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11">Terraform</text>
  <text x="500" y="380" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11">GitLab CI / Actions</text>

  <!-- Observability -->
  <rect x="605" y="310" width="160" height="80" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5" opacity="0.9"/>
  <text x="685" y="342" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Observability</text>
  <text x="685" y="364" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11">Prometheus · Grafana</text>
  <text x="685" y="380" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11">ELK · CloudWatch</text>

  <!-- AI / ML -->
  <rect x="785" y="310" width="160" height="80" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5" opacity="0.9"/>
  <text x="865" y="342" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="13" font-weight="600">AI Infrastructure</text>
  <text x="865" y="364" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11">LLM Serving</text>
  <text x="865" y="380" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11">RAG · Agents</text>

  <!-- Data Layer -->
  <!-- PostgreSQL -->
  <rect x="100" y="450" width="160" height="70" rx="8" fill="url(#greenGrad)" filter="url(#shadow)" opacity="0.85"/>
  <text x="180" y="478" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">PostgreSQL</text>
  <text x="180" y="500" text-anchor="middle" fill="#b5d1b8" font-family="monospace" font-size="11">Primary Relational DB</text>

  <!-- Redis -->
  <rect x="290" y="450" width="150" height="70" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5" opacity="0.9"/>
  <text x="365" y="478" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Redis</text>
  <text x="365" y="500" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11">Cache · Queue · Pub/Sub</text>

  <!-- DynamoDB -->
  <rect x="470" y="450" width="160" height="70" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5" opacity="0.9"/>
  <text x="550" y="478" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="13" font-weight="600">DynamoDB</text>
  <text x="550" y="500" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11">NoSQL · Event Store</text>

  <!-- S3 -->
  <rect x="660" y="450" width="160" height="70" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5" opacity="0.9"/>
  <text x="740" y="478" text-anchor="middle" fill="#8b949e" font-family="system-ui, sans-serif" font-size="13" font-weight="600">AWS S3</text>
  <text x="740" y="500" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11">Object Storage · Data Lake</text>

  <!-- Connection arrows (data flow) -->
  <g stroke="#30363d" stroke-width="0.8" opacity="0.5">
    <!-- API GW to Orchestrator -->
    <line x1="490" y1="137" x2="510" y2="180"/>
    <!-- Orchestrator to Workers -->
    <line x1="410" y1="215" x2="340" y2="215"/>
    <!-- Orchestrator to Event Bus -->
    <line x1="610" y1="215" x2="660" y2="215"/>
    <!-- Workers to Compute -->
    <line x1="250" y1="250" x2="135" y2="310"/>
    <!-- Orchestrator to Containers -->
    <line x1="510" y1="250" x2="320" y2="310"/>
    <!-- Compute to DB Layer -->
    <line x1="135" y1="390" x2="180" y2="450"/>
    <line x1="320" y1="390" x2="365" y2="450"/>
    <line x1="500" y1="390" x2="550" y2="450"/>
    <line x1="685" y1="390" x2="740" y2="450"/>
  </g>

  <!-- Footer -->
  <text x="500" y="580" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="11">
    Distributed Systems · Event-Driven · Cloud Native · Platform Engineering
  </text>
</svg>