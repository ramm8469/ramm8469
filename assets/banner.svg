<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#30363d"/>
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#30363d"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/>
    <line x1="1100" y1="0" x2="1100" y2="500"/>
  </g>

  <!-- Network nodes (subtle) -->
  <g opacity="0.25">
    <circle cx="120" cy="130" r="3" fill="#58a6ff"/>
    <circle cx="280" cy="180" r="2" fill="#8b5cf6"/>
    <circle cx="450" cy="120" r="3" fill="#58a6ff"/>
    <circle cx="600" cy="160" r="2" fill="#8b5cf6"/>
    <circle cx="750" cy="140" r="3" fill="#58a6ff"/>
    <circle cx="950" cy="170" r="2" fill="#8b5cf6"/>
    <circle cx="1050" cy="130" r="2.5" fill="#58a6ff"/>
    <circle cx="180" cy="350" r="2" fill="#8b5cf6"/>
    <circle cx="400" cy="380" r="2.5" fill="#58a6ff"/>
    <circle cx="650" cy="360" r="2" fill="#8b5cf6"/>
    <circle cx="850" cy="390" r="3" fill="#58a6ff"/>
    <circle cx="1020" cy="370" r="2" fill="#8b5cf6"/>

    <!-- Connection lines -->
    <line x1="120" y1="130" x2="280" y2="180" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="280" y1="180" x2="450" y2="120" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="450" y1="120" x2="600" y2="160" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="600" y1="160" x2="750" y2="140" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="750" y1="140" x2="950" y2="170" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="950" y1="170" x2="1050" y2="130" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="180" y1="350" x2="400" y2="380" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="400" y1="380" x2="650" y2="360" stroke="#8b5cf6" stroke-width="0.5"/>
    <line x1="650" y1="360" x2="850" y2="390" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="850" y1="390" x2="1020" y2="370" stroke="#8b5cf6" stroke-width="0.5"/>
  </g>

  <!-- Code fragments (subtle background) -->
  <g fill="#30363d" font-family="monospace" font-size="12" opacity="0.4">
    <text x="40" y="60">from platform import Engine</text>
    <text x="40" y="78">@orchestrator.task()</text>
    <text x="40" y="96">def scale(*workers: int):</text>
    <text x="900" y="60">apiVersion: v1</text>
    <text x="900" y="78">kind: Service</text>
    <text x="900" y="96">  name: platform</text>
    <text x="900" y="114">  type: ClusterIP</text>
    <text x="40" y="420">distributed_systems:</text>
    <text x="40" y="438">  event_driven: true</text>
    <text x="40" y="456">  cloud_native: true</text>
    <text x="900" y="420">monitoring:</text>
    <text x="900" y="438">  - prometheus</text>
    <text x="900" y="456">  - grafana</text>
    <text x="900" y="474">  - opentelemetry</text>
  </g>

  <!-- Line separator -->
  <line x1="100" y1="230" x2="1100" y2="230" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- Name -->
  <text x="600" y="170" text-anchor="middle" fill="#f0f6fc" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" filter="url(#glow)">
    Ram Mohan Kunwar
  </text>

  <!-- Title -->
  <text x="600" y="210" text-anchor="middle" fill="url(#accent)" font-family="system-ui, -apple-system, sans-serif" font-size="18" letter-spacing="4">
    Technical Lead • Platform Engineer • Backend Architect
  </text>

  <!-- Subtitle tags -->
  <g text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14">
    <text x="220" y="290" fill="#58a6ff">Cloud Native</text>
    <text x="420" y="290" fill="#8b5cf6">Distributed Systems</text>
    <text x="640" y="290" fill="#58a6ff">Workflow Orchestration</text>
    <text x="860" y="290" fill="#8b5cf6">Platform Engineering</text>
    <text x="1050" y="290" fill="#58a6ff">AI Infrastructure</text>
  </g>

  <!-- Tag underlines -->
  <g>
    <line x1="185" y1="298" x2="255" y2="298" stroke="#58a6ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="380" y1="298" x2="460" y2="298" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <line x1="600" y1="298" x2="680" y2="298" stroke="#58a6ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="820" y1="298" x2="900" y2="298" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <line x1="1015" y1="298" x2="1085" y2="298" stroke="#58a6ff" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Footer -->
  <text x="600" y="385" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="13">
    Designing platforms that scale. Engineering distributed systems that last.
  </text>
</svg>